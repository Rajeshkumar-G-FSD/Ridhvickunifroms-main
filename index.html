          "name": "Does Ridhvick offer custom logo embroidery for school uniforms?",

            "@type": "Answer",

          }
        },

          "@type": "Question",
          "name": "Can Ridhvick handle bulk school uniform orders for an entire institution?",
          "acceptedAnswer": {

          }
        },
