<!--
  Ridhvick Uniforms — Open Graph tag block (homepage)
  Paste inside <head>. This exact block is already live in index.html —
  kept here as the reference copy for the SEO package, and as the pattern
  to duplicate (swapping title/description/image/url) for each of the 9
  recommended pages in metadata/all-pages.md.
-->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Ridhvick Uniforms" />
<meta property="og:title" content="Ridhvick Uniforms | Premium School & Sports Uniform Manufacturer" />
<meta property="og:description" content="Premium quality school uniforms, tailored blazers, sports jerseys, and custom embroidery. Crafting academic pride since 2009." />
<meta property="og:image" content="https://www.ridhvickuniforms.com/images/ridhvick_uniforms_hero_kids.png" />
<meta property="og:image:width" content="1600" />
<meta property="og:image:height" content="900" />
<meta property="og:image:alt" content="School children wearing Ridhvick school uniforms" />
<meta property="og:url" content="https://www.ridhvickuniforms.com/" />
<meta property="og:locale" content="en_IN" />

<!--
  Facebook-specific (optional, only needed if you claim the Page via
  Facebook Business Manager — leave commented out until you have a real
  Facebook Page ID; a fake/placeholder app ID here breaks Facebook's
  Sharing Debugger validation rather than helping it).
  <meta property="fb:app_id" content="REPLACE_WITH_REAL_FACEBOOK_APP_ID" />
-->

<!--
  LinkedIn reads standard Open Graph tags above — no LinkedIn-specific
  meta tags exist. To control how a link looks when shared to LinkedIn,
  the og:title / og:description / og:image tags above are sufficient;
  validate with LinkedIn's Post Inspector before a real campaign:
  https://www.linkedin.com/post-inspector/
-->
