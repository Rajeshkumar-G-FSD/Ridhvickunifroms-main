# Ridhvick Uniforms — nginx configuration
#
# NOT APPLICABLE today — the site is deployed as static files on cPanel
# (Apache, see public/.htaccess), not nginx. Provided in case of a future
# move to a VPS/cloud host. Two real, complete configurations below for
# the two ways this project could actually be served — pick the one that
# matches your hosting, don't mix them.

# =========================================================================
# OPTION A — Static-only (mirrors the current cPanel deployment exactly:
# dist/ contents served directly, no Node process). Use this if you move
# to an nginx-fronted static host (e.g. a VPS serving dist/ directly, or
# nginx in front of S3/object storage).
# =========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name ridhvickuniforms.com www.ridhvickuniforms.com;

    # Redirect to HTTPS once a certificate is active — see SEO/README.md
    # Finding #2 before enabling this; a redirect with no valid cert
    # active yet will make the site unreachable.
    return 301 https://www.ridhvickuniforms.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ridhvickuniforms.com www.ridhvickuniforms.com;

    # ssl_certificate     /etc/letsencrypt/live/ridhvickuniforms.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ridhvickuniforms.com/privkey.pem;

    root /var/www/ridhvickuniforms/dist;
    index index.html;

    gzip on;
    gzip_types text/html text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets — safe to cache for a long time (mirrors public/.htaccess)
    location ~* \.(?:js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    # index.html must always be revalidated so deploys go live immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# =========================================================================
# OPTION B — nginx as a reverse proxy in front of the real Express server
# (server.ts / dist/server.cjs, per package.json's `npm start`). Use this
# only if you actually run the Node process (needed for the /api/ai/chat
# and /api/ai/size-recommend Gemini endpoints to work live — see the
# earlier cPanel deployment conversation: those are static-fallback-only
# on the current Apache/cPanel setup because no Node process runs there).
# =========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name ridhvickuniforms.com www.ridhvickuniforms.com;
    return 301 https://www.ridhvickuniforms.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ridhvickuniforms.com www.ridhvickuniforms.com;

    # ssl_certificate     /etc/letsencrypt/live/ridhvickuniforms.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ridhvickuniforms.com/privkey.pem;

    gzip on;
    gzip_types text/html text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # server.ts listens on PORT env var (default 3000) — see server.ts line 10
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let nginx serve hashed static assets directly instead of round-tripping
    # through Node — same cache policy as Option A.
    location ~* \.(?:js|css|woff2?)$ {
        root /var/www/ridhvickuniforms/dist;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:png|jpe?g|gif|svg|webp|ico)$ {
        root /var/www/ridhvickuniforms/dist;
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }
}
